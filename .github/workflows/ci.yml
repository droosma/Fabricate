name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore
        run: dotnet restore
      
      - name: Build
        run: dotnet build --no-restore --configuration Release
      
      - name: Test with coverage
        run: |
          dotnet test --no-build --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./coverage" \
            -reporttypes:"TextSummary"
          cat ./coverage/Summary.txt

      - name: Check coverage threshold
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-check" \
            -reporttypes:"JsonSummary"
          
          LINE_COVERAGE=$(python3 -c "
          import json
          with open('./coverage-check/Summary.json') as f:
              data = json.load(f)
          print(data['summary']['linecoverage'])
          ")
          
          echo "Line coverage: ${LINE_COVERAGE}%"
          
          if (( $(echo "$LINE_COVERAGE < 100" | bc -l) )); then
            echo "❌ Coverage is below 100%: ${LINE_COVERAGE}%"
            exit 1
          fi
          
          echo "✅ Coverage is at 100%"

  mutation-testing:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Install Stryker
        run: dotnet tool install -g dotnet-stryker
      
      - name: Run Stryker
        run: dotnet stryker --config-file stryker-config.json
      
      - name: Upload Stryker report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-report
          path: StrykerOutput/

      - name: Publish mutation score badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          REPORT=$(find StrykerOutput -name "mutation-report.json" | head -1)
          SCORE=$(python3 -c "
          import json, sys
          with open('$REPORT') as f:
              data = json.load(f)
          files = data.get('files', {})
          killed = sum(1 for f in files.values() for m in f.get('mutants', []) if m['status'] in ('Killed', 'Timeout'))
          survived = sum(1 for f in files.values() for m in f.get('mutants', []) if m['status'] == 'Survived')
          no_cov = sum(1 for f in files.values() for m in f.get('mutants', []) if m['status'] == 'NoCoverage')
          total = killed + survived + no_cov
          score = (killed / total * 100) if total > 0 else 100
          print(f'{score:.1f}')
          ")
          echo "Mutation score: ${SCORE}%"
          
          COLOR="red"
          if (( $(echo "$SCORE >= 100" | bc -l) )); then COLOR="brightgreen"
          elif (( $(echo "$SCORE >= 80" | bc -l) )); then COLOR="green"
          elif (( $(echo "$SCORE >= 60" | bc -l) )); then COLOR="yellow"
          fi
          
          # Write badge to a temp location before switching branches
          mkdir -p /tmp/badge
          printf '{"schemaVersion":1,"label":"mutation score","message":"%s%%","color":"%s"}' "$SCORE" "$COLOR" > /tmp/badge/mutation.json
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Switch to badges branch (create orphan if it doesn't exist)
          git fetch origin badges 2>/dev/null && git checkout -B badges origin/badges || { git checkout --orphan badges; git rm -rf . 2>/dev/null || true; }
          
          mkdir -p .badges
          cp /tmp/badge/mutation.json .badges/mutation.json
          git add .badges/mutation.json
          git diff --cached --quiet || git commit -m "Update mutation score badge: ${SCORE}%"
          git push origin badges --force
